<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Game</title>
  <style>
    :root {
      --bg-color: #121212;
      --container-bg: #1e1e1e;
      --primary: #bb86fc;
      --primary-hover: #9965f4;
      --text-main: #e0e0e0;
      --text-muted: #888;
      --correct: #4ade80;
      --incorrect: #f87171;
      --card-bg: #2a2a2a;
      --border-color: #333;
    }

    body {
      font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      max-width: 800px;
      width: 100%;
      background: var(--container-bg);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    }

    h1 {
      margin-top: 0;
      font-size: 2.5rem;
      color: var(--primary);
      text-align: center;
      margin-bottom: 30px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    #game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #sentence-display {
      font-size: 2rem;
      line-height: 1.6;
      margin-bottom: 40px;
      letter-spacing: 1px;
      min-height: 100px;
      color: var(--text-muted);
      text-align: center;
      user-select: none;
    }

    .correct {
      color: var(--correct);
    }

    .incorrect {
      color: var(--incorrect);
      text-decoration: underline;
      text-decoration-thickness: 3px;
      text-underline-offset: 4px;
    }

    #typing-input {
      width: 100%;
      max-width: 650px;
      padding: 18px 24px;
      font-size: 1.5rem;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      background-color: var(--card-bg);
      color: #fff;
      outline: none;
      transition: all 0.3s ease;
      margin-bottom: 25px;
      text-align: center;
      font-family: inherit;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    #typing-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(187, 134, 252, 0.2), inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    #typing-input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #start-btn,
    #play-again-btn {
      background-color: var(--primary);
      color: #121212;
      border: none;
      padding: 16px 48px;
      font-size: 1.25rem;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      margin: 10px auto;
      display: block;
    }

    #start-btn:hover:not(:disabled),
    #play-again-btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
    }

    #start-btn:active:not(:disabled),
    #play-again-btn:active {
      transform: translateY(0);
    }

    #start-btn:disabled {
      background-color: #555;
      color: #999;
      cursor: not-allowed;
    }

    .results {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-top: 20px;
      margin-bottom: 40px;
    }

    .metric-card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid var(--border-color);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .metric-value {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .metric-label {
      font-size: 0.9rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
    }

    .wpm .metric-value {
      color: #60a5fa;
    }

    .acc .metric-value {
      color: var(--correct);
    }

    .err .metric-value {
      color: var(--incorrect);
    }

    .grd .metric-value {
      color: #bb86fc;
    }

    .loader {
      border: 4px solid var(--border-color);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
      margin: 0 auto 30px auto;
      display: none;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 600px) {
      .results {
        grid-template-columns: 1fr;
      }

      #sentence-display {
        font-size: 1.5rem;
      }

      .metric-value {
        font-size: 2.5rem;
      }
    }

    .leaderboard {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
      width: 100%;
    }
    .leaderboard h2 {
      text-align: center;
      color: var(--primary);
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 1.5rem;
    }
    #leaderboard-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #leaderboard-list li {
      display: flex;
      justify-content: space-between;
      padding: 10px 15px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: var(--card-bg);
      margin-bottom: 8px;
      border-radius: 8px;
    }
    #leaderboard-list li span.score {
      color: var(--correct);
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Typing Speed Game</h1>
    <div class="loader" id="loader"></div>
    <div id="game-area">
      <div id="sentence-display"></div>
      <input type="text" id="typing-input" autocomplete="off" disabled>
      <button id="start-btn" disabled>Loading...</button>
    </div>
    <div class="results" id="results">
      <div class="metric-card wpm">
        <div class="metric-value" id="wpm-value">0</div>
        <div class="metric-label">WPM</div>
      </div>
      <div class="metric-card acc">
        <div class="metric-value" id="acc-value">0%</div>
        <div class="metric-label">Accuracy</div>
      </div>
      <div class="metric-card err">
        <div class="metric-value" id="err-value">0</div>
        <div class="metric-label">Errors</div>
      </div>
      <div class="metric-card grd">
        <div class="metric-value" id="grd-value">-</div>
        <div class="metric-label">Grade</div>
      </div>
    </div>
    <button id="play-again-btn" style="display: none;">Play Again</button>
    <div id="leaderboard" class="leaderboard">
      <h2>Top Scores</h2>
      <ul id="leaderboard-list"></ul>
    </div>
  </div>
  <script>
    const sentenceDisplay = document.getElementById('sentence-display');
    const typingInput = document.getElementById('typing-input');
    const startBtn = document.getElementById('start-btn');
    const loader = document.getElementById('loader');
    const gameArea = document.getElementById('game-area');
    const results = document.getElementById('results');
    const playAgainBtn = document.getElementById('play-again-btn');
    const wpmValue = document.getElementById('wpm-value');
    const accValue = document.getElementById('acc-value');
    const errValue = document.getElementById('err-value');
    const grdValue = document.getElementById('grd-value');
    const leaderboardContainer = document.getElementById('leaderboard');
    const leaderboardList = document.getElementById('leaderboard-list');

    let targetSentence = '';
    let startTime = null;
    let gameStarted = false;
    let gameEnded = false;
    let errorsMade = 0;
    let totalKeystrokes = 0;
    let previousLength = 0;
    const sentences = [
      "The quick brown fox jumps over the lazy dog.",
      "Programming is the art of telling another human what one wants the computer to do.",
      "A user interface is like a joke. If you have to explain it, it's not that good.",
      "Code is read much more often than it is written.",
      "Simplicity is the soul of efficiency.",
      "In software, the most beautiful code is the code that is not written.",
      "Before software can be reusable it first has to be usable.",
      "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.",
      "There are only two hard things in Computer Science: cache invalidation and naming things.",
      "Design is not just what it looks like and feels like. Design is how it works.",
      "First, solve the problem. Then, write the code.",
      "Experience is the name everyone gives to their mistakes.",
      "Java is to JavaScript what car is to Carpet.",
      "Sometimes it pays to stay in bed on Monday, rather than spending the rest of the week debugging Monday's code."
    ];

    function saveScore(wpm, accuracy) {
      const scores = JSON.parse(localStorage.getItem('typingLeaderboard') || '[]');
      scores.push({ wpm, accuracy, date: new Date().toLocaleDateString() });
      scores.sort((a, b) => b.wpm - a.wpm);
      scores.splice(5); // Keep top 5
      localStorage.setItem('typingLeaderboard', JSON.stringify(scores));
      renderLeaderboard();
    }

    function renderLeaderboard() {
      const scores = JSON.parse(localStorage.getItem('typingLeaderboard') || '[]');
      if (scores.length === 0) {
        leaderboardList.innerHTML = '<li><span style="color:var(--text-muted);width:100%;text-align:center;">No scores yet. Play a game!</span></li>';
        return;
      }
      leaderboardList.innerHTML = scores.map((s, i) => `
        <li>
          <span>#${i + 1} <span class="score">${s.wpm} WPM</span> (${s.accuracy}%)</span>
          <span>${s.date}</span>
        </li>
      `).join('');
    }

    function pickSentence() {
      targetSentence = sentences[Math.floor(Math.random() * sentences.length)];
      renderSentence();
      startBtn.disabled = false;
      startBtn.textContent = 'Start';
      typingInput.disabled = false;
      typingInput.placeholder = 'Click Start or begin typing...';
    }
    function renderSentence() {
      sentenceDisplay.innerHTML = '';
      targetSentence.split('').forEach(char => {
        const span = document.createElement('span');
        span.innerText = char;
        sentenceDisplay.appendChild(span);
      });
    }
    function startGame() {
      if (gameStarted) return;
      gameStarted = true;
      gameEnded = false;
      startTime = new Date();
      errorsMade = 0;
      totalKeystrokes = 0;
      previousLength = typingInput.value.length;
      startBtn.style.display = 'none';
      leaderboardContainer.style.display = 'none';
      typingInput.focus();
      typingInput.placeholder = 'Type the sentence here...';
    }
    function endGame() {
      gameEnded = true;
      typingInput.disabled = true;
      const endTime = new Date();
      const elapsedSeconds = (endTime - startTime) / 1000;
      const words = targetSentence.trim().split(/\s+/).length;
      const wpm = elapsedSeconds > 0 ? Math.round((words / elapsedSeconds) * 60) : 0;
      const accuracy = totalKeystrokes === 0 ? 0 : Math.round(((totalKeystrokes - errorsMade) / totalKeystrokes) * 100);
      wpmValue.textContent = wpm;
      accValue.textContent = `${Math.max(0, accuracy)}%`;
      errValue.textContent = errorsMade;
      let grade = 'F';
      let gradeColor = 'var(--incorrect)';
      if (wpm >= 100) { grade = 'S'; gradeColor = '#bb86fc'; }
      else if (wpm >= 80) { grade = 'A'; gradeColor = 'var(--correct)'; }
      else if (wpm >= 60) { grade = 'B'; gradeColor = '#60a5fa'; }
      else if (wpm >= 40) { grade = 'C'; gradeColor = '#facc15'; }
      else if (wpm >= 20) { grade = 'D'; gradeColor = '#fb923c'; }

      grdValue.textContent = grade;
      grdValue.style.color = gradeColor;
      gameArea.style.display = 'none';
      results.style.display = 'grid';
      playAgainBtn.style.display = 'block';

      saveScore(wpm, accuracy);
      leaderboardContainer.style.display = 'block';
    }
    typingInput.addEventListener('input', (e) => {
      if (gameEnded) return;
      if (!gameStarted) {
        startGame();
      }
      let typedText = typingInput.value;
      const spans = sentenceDisplay.querySelectorAll('span');
      // Prevent typing past the end of the sentence
      if (typedText.length > targetSentence.length) {
        typingInput.value = typedText.substring(0, targetSentence.length);
        typedText = typingInput.value;
      }
      // Calculate errors and keystrokes based on newly added text
      if (typedText.length > previousLength) {
        const addedText = typedText.substring(previousLength);
        for (let i = 0; i < addedText.length; i++) {
          totalKeystrokes++;
          if (addedText[i] !== targetSentence[previousLength + i]) {
            errorsMade++;
          }
        }
      }
      previousLength = typedText.length;
      // Update display colors on the sentence
      spans.forEach((span, index) => {
        const char = typedText[index];
        span.className = '';
        if (char == null) {
          // Not typed yet
        } else if (char === span.innerText) {
          span.classList.add('correct');
        } else {
          span.classList.add('incorrect');
        }
      });
      // Check if finished typing the full sentence
      if (typedText.length === targetSentence.length) {
        endGame();
      }
    });
    startBtn.addEventListener('click', startGame);
    playAgainBtn.addEventListener('click', () => {
      results.style.display = 'none';
      playAgainBtn.style.display = 'none';
      gameArea.style.display = 'flex';
      startBtn.style.display = 'block';
      leaderboardContainer.style.display = 'block';
      gameStarted = false;
      gameEnded = false;
      typingInput.value = '';
      previousLength = 0;
      pickSentence();
    });
    // Initialize the game by picking the first sentence
    pickSentence();
    renderLeaderboard();
  </script>
</body>

</html>
